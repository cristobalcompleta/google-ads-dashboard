<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaidSearch — LP GenericCore Experiment</title>
<script src="lp-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;font-size:13px}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 28px;display:flex;align-items:center;gap:14px}
.logo{width:38px;height:38px;background:#f5a623;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:11px;flex-shrink:0;letter-spacing:-.5px}
.header-text h1{font-size:16px;font-weight:700;color:#0f172a;line-height:1.2}
.header-text p{font-size:11px;color:#94a3b8;margin-top:2px}

/* ── CONTROLS BAR ────────────────────────────────────────────────────────── */
.controls-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 28px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.ctrl-group{display:flex;align-items:center;gap:8px}
.ctrl-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.ctrl-sep{width:1px;height:24px;background:#e2e8f0;flex-shrink:0}
.period-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;color:#fff;flex-shrink:0}
.badge-a{background:#3b82f6}
.badge-b{background:#f97316}
.period-sep{font-size:11px;color:#94a3b8}
.date-input{border:1px solid #cbd5e1;border-radius:5px;padding:4px 8px;font-size:12px;color:#1e293b;background:#fff;cursor:pointer}
.date-input:focus{outline:none;border-color:#f5a623;box-shadow:0 0 0 2px rgba(245,166,35,.12)}

/* ── MAIN LAYOUT ─────────────────────────────────────────────────────────── */
.main{padding:20px 28px;display:flex;flex-direction:column;gap:24px}

/* ── SECTION CARD ────────────────────────────────────────────────────────── */
.section{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
.section-header{padding:18px 24px;border-bottom:1px solid #e2e8f0}
.section-title{font-size:14px;font-weight:700;color:#0f172a}
.section-sub{font-size:11px;color:#94a3b8;margin-top:3px}
.section-body{padding:20px 24px}

/* ── CHART ───────────────────────────────────────────────────────────────── */
.chart-wrap{position:relative;width:100%;height:300px}

/* ── TABLES ──────────────────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f1f5f9}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid #e2e8f0}
th.num{text-align:right}
th.sort-hd{cursor:pointer;user-select:none;transition:color .12s,background .12s}
th.sort-hd:hover{color:#f5a623;background:#fffbf5}
th.sort-hd.sort-active{color:#f5a623}
.sort-ind{font-size:8px;margin-left:2px;opacity:.4}
th.sort-active .sort-ind{opacity:1}
td{padding:9px 14px;font-size:12px;color:#1e293b;border-bottom:1px solid #f1f5f9;white-space:nowrap}
td.num{text-align:right;font-variant-numeric:tabular-nums}
td.name-col{font-weight:500;color:#334155;max-width:260px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
tr.summary-row td{background:#f0f9ff;font-weight:700;color:#0f172a;border-bottom:2px solid #bae6fd}
tr.summary-row:hover td{background:#e0f2fe}

/* ── CVR highlight columns ──────────────────────────────────────────────── */
td.cvr-col, th.cvr-col{background:#fffbeb}
th.cvr-col:first-of-type, td.cvr-col:first-of-type{border-left:2px solid #f5a623}
tr.summary-row td.cvr-col{background:#fef9c3}

/* ── DELTA COLORS ────────────────────────────────────────────────────────── */
.delta-good{color:#16a34a;font-weight:600}
.delta-bad{color:#dc2626;font-weight:600}
.delta-neu{color:#64748b}

/* ── DATA NOT LOADED ─────────────────────────────────────────────────────── */
.no-data{padding:60px;text-align:center;color:#94a3b8;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.no-data-icon{font-size:36px}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">CU</div>
  <div class="header-text">
    <h1>PaidSearch — LP GenericCore Experiment</h1>
    <p>NonBrand &middot; LP change live: Apr 13, 2026</p>
  </div>
</header>

<!-- ── CONTROLS BAR ───────────────────────────────────────────────────────── -->
<div class="controls-bar">
  <div class="ctrl-group">
    <span class="ctrl-label">Period</span>
    <span class="period-badge badge-a">A</span>
    <input class="date-input" type="date" id="pA_start" value="2026-04-01">
    <span class="period-sep">→</span>
    <input class="date-input" type="date" id="pA_end" value="2026-04-12">
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <span class="period-badge badge-b">B</span>
    <input class="date-input" type="date" id="pB_start" value="2026-04-13">
    <span class="period-sep">→</span>
    <input class="date-input" type="date" id="pB_end">
  </div>
</div>

<!-- ── MAIN ────────────────────────────────────────────────────────────────── -->
<div class="main" id="mainContent">
  <!-- content injected by JS -->
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const LP_CHANGE_DATE = '2026-04-13';

// ─────────────────────────────────────────────────────────────────────────────
// DATA AVAILABILITY CHECK
// ─────────────────────────────────────────────────────────────────────────────
function isDataLoaded() {
  return typeof LP_TEST !== 'undefined' && Array.isArray(LP_TEST) && LP_TEST.length > 0
      && typeof LP_CONTROL !== 'undefined' && Array.isArray(LP_CONTROL) && LP_CONTROL.length > 0;
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILITY
// ─────────────────────────────────────────────────────────────────────────────
const TEST_PREFIX = 'nonbrand_search_genericcore_u_keyword_';

function stripPrefix(name) {
  const n = name.toLowerCase();
  if (n.startsWith(TEST_PREFIX)) return name.slice(TEST_PREFIX.length);
  return name;
}

function fmt(n, decimals = 0) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtDollar(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + fmt(n, 2);
}

function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n) || !isFinite(n)) return '—';
  return fmt(n, 2) + '%';
}

function calcDelta(a, b) {
  if (!a || !b || a === 0) return null;
  return ((b - a) / a) * 100;
}

function deltaHtml(pct, higherIsBetter) {
  if (pct === null || pct === undefined || isNaN(pct) || !isFinite(pct)) return '<span class="delta-neu">—</span>';
  const isGood = higherIsBetter ? pct > 0 : pct < 0;
  const cls = isGood ? 'delta-good' : 'delta-bad';
  const arrow = pct > 0 ? '↑' : '↓';
  return `<span class="${cls}">${arrow} ${fmt(Math.abs(pct), 1)}%</span>`;
}

function aggregateRows(rows) {
  const imp = rows.reduce((s, r) => s + (r.imp || 0), 0);
  const cl = rows.reduce((s, r) => s + (r.cl || 0), 0);
  const cost = rows.reduce((s, r) => s + (r.cost || 0), 0);
  const trials = rows.reduce((s, r) => s + (r.trials || 0), 0);
  const ctr = imp > 0 ? (cl / imp) * 100 : null;
  const cpc = cl > 0 ? cost / cl : null;
  const cvr = cl > 0 ? (trials / cl) * 100 : null;
  const cac = trials > 0 ? cost / trials : null;
  return { imp, cl, cost, trials, ctr, cpc, cvr, cac };
}

function getMetrics(rows, startDate, endDate) {
  const filtered = rows.filter(r => r.d >= startDate && r.d <= endDate);
  return aggregateRows(filtered);
}

// ─────────────────────────────────────────────────────────────────────────────
// CHART STATE
// ─────────────────────────────────────────────────────────────────────────────
let cvrChart = null;

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function getPeriods() {
  const pA_start = document.getElementById('pA_start').value;
  const pA_end = document.getElementById('pA_end').value;
  const pB_start = document.getElementById('pB_start').value;
  const pB_end = document.getElementById('pB_end').value;
  return { pA_start, pA_end, pB_start, pB_end };
}

function render() {
  if (!isDataLoaded()) {
    renderNoData();
    return;
  }
  renderChart();
  renderTestTable();
  renderControlTable();
}

function renderNoData() {
  document.getElementById('mainContent').innerHTML = `
    <div class="section">
      <div class="no-data">
        <div class="no-data-icon">&#128196;</div>
        <div><strong>Data not loaded</strong></div>
        <div style="font-size:12px">Make sure <code>lp-data.js</code> is in the same directory and defines <code>LP_TEST</code> and <code>LP_CONTROL</code>.</div>
      </div>
    </div>`;
}

function buildLayout() {
  document.getElementById('mainContent').innerHTML = `
    <!-- Section 1: Chart -->
    <div class="section" id="sec-chart">
      <div class="section-header">
        <div class="section-title">Daily CVR — Test vs Control</div>
        <div class="section-sub">Trials / Clicks &middot; Test = GenericCore AGs on new LP &middot; Control = other NonBrand campaigns &middot; 7-day rolling average shown as dashed line</div>
      </div>
      <div class="section-body">
        <div class="chart-wrap"><canvas id="cvrCanvas"></canvas></div>
      </div>
    </div>
    <!-- Section 2: Test Table -->
    <div class="section" id="sec-test">
      <div class="section-header">
        <div class="section-title">Test — GenericCore Ad Groups</div>
        <div class="section-sub">13 ad groups on the new landing page since Apr 13</div>
      </div>
      <div id="testTableWrap"></div>
    </div>
    <!-- Section 3: Control Table -->
    <div class="section" id="sec-control">
      <div class="section-header">
        <div class="section-title">Control — Other NonBrand Campaigns</div>
        <div class="section-sub">All NonBrand SEM campaigns excluding GenericCore &middot; campaign-level aggregation</div>
      </div>
      <div id="controlTableWrap"></div>
    </div>
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// CVR CHART
// ─────────────────────────────────────────────────────────────────────────────
function movingAvg(arr, window) {
  return arr.map((_, i) => {
    const start = Math.max(0, i - window + 1);
    const slice = arr.slice(start, i + 1).filter(v => v !== null);
    if (slice.length === 0) return null;
    return slice.reduce((s, v) => s + v, 0) / slice.length;
  });
}

function renderChart() {
  // Gather all dates from both datasets, sorted
  const dateSet = new Set([
    ...LP_TEST.map(r => r.d),
    ...LP_CONTROL.map(r => r.d),
  ]);
  const allDates = [...dateSet].sort();

  function dailyCVR(rows, dateField) {
    const byDate = {};
    rows.forEach(r => {
      const d = r[dateField] || r.d;
      if (!byDate[d]) byDate[d] = { cl: 0, trials: 0 };
      byDate[d].cl += r.cl || 0;
      byDate[d].trials += r.trials || 0;
    });
    return allDates.map(d => {
      const v = byDate[d];
      if (!v || v.cl === 0) return null;
      return (v.trials / v.cl) * 100;
    });
  }

  const testCVR    = dailyCVR(LP_TEST, 'd');
  const controlCVR = dailyCVR(LP_CONTROL, 'd');
  const testMA     = movingAvg(testCVR, 7);
  const controlMA  = movingAvg(controlCVR, 7);

  const lpChangeIdx = allDates.indexOf(LP_CHANGE_DATE);

  const vertLinePlugin = {
    id: 'vertLine',
    afterDraw(chart) {
      if (lpChangeIdx < 0) return;
      const ctx = chart.ctx;
      const xScale = chart.scales.x;
      const yScale = chart.scales.y;
      const x = xScale.getPixelForValue(lpChangeIdx);
      if (x === undefined || x === null) return;
      ctx.save();
      ctx.setLineDash([5, 4]);
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x, yScale.top);
      ctx.lineTo(x, yScale.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#ef4444';
      ctx.font = '600 10px -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('LP Change', x + 5, yScale.top + 14);
      ctx.restore();
    }
  };

  const canvas = document.getElementById('cvrCanvas');
  if (!canvas) return;

  if (cvrChart) { cvrChart.destroy(); cvrChart = null; }

  cvrChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: allDates.map(d => { const p = d.split('-'); return `${p[1]}/${p[2]}`; }),
      datasets: [
        {
          label: 'Test (GenericCore)',
          data: testCVR,
          borderColor: '#f5a623',
          backgroundColor: 'rgba(245,166,35,.08)',
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 5,
          fill: false,
          spanGaps: true,
        },
        {
          label: 'Control (Other NonBrand)',
          data: controlCVR,
          borderColor: '#64748b',
          backgroundColor: 'rgba(100,116,139,.06)',
          borderWidth: 2,
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 5,
          fill: false,
          spanGaps: true,
        },
        {
          label: 'Test 7d MA',
          data: testMA,
          borderColor: '#f5a623',
          borderWidth: 1.5,
          borderDash: [5, 4],
          tension: 0.3,
          pointRadius: 0,
          fill: false,
          spanGaps: true,
        },
        {
          label: 'Control 7d MA',
          data: controlMA,
          borderColor: '#64748b',
          borderWidth: 1.5,
          borderDash: [5, 4],
          tension: 0.3,
          pointRadius: 0,
          fill: false,
          spanGaps: true,
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          align: 'end',
          labels: { boxWidth: 20, font: { size: 11 }, color: '#475569', usePointStyle: true, pointStyleWidth: 16 }
        },
        tooltip: {
          callbacks: {
            label(ctx) {
              const v = ctx.parsed.y;
              if (v === null) return `${ctx.dataset.label}: —`;
              return `${ctx.dataset.label}: ${v.toFixed(2)}%`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#f1f5f9' },
          ticks: { font: { size: 10 }, color: '#94a3b8', maxTicksLimit: 20 }
        },
        y: {
          grid: { color: '#f1f5f9' },
          ticks: { font: { size: 10 }, color: '#94a3b8', callback: v => v.toFixed(1) + '%' },
          title: { display: true, text: 'CVR %', font: { size: 10 }, color: '#94a3b8' }
        }
      }
    },
    plugins: [vertLinePlugin]
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// TABLES — shared rendering
// ─────────────────────────────────────────────────────────────────────────────

const sortState = {
  test:    { col: null, dir: 1 },
  control: { col: null, dir: 1 }
};

// COL_DEFS: key 'name' is the generic row identifier (ag or camp)
const COL_DEFS = [
  { key: 'name',  label: 'Name',     num: false, good: null },
  { key: 'impA',  label: 'Imp A',    num: true,  good: null },
  { key: 'impB',  label: 'Imp B',    num: true,  good: null },
  { key: 'clA',   label: 'Clicks A', num: true,  good: null },
  { key: 'clB',   label: 'Clicks B', num: true,  good: null },
  { key: 'ctrA',  label: 'CTR A',    num: true,  good: null },
  { key: 'ctrB',  label: 'CTR B',    num: true,  good: null },
  { key: 'dctr',  label: '△ CTR',    num: true,  good: true  },
  { key: 'costA', label: 'Cost A',   num: true,  good: null },
  { key: 'costB', label: 'Cost B',   num: true,  good: null },
  { key: 'cpcA',  label: 'CPC A',    num: true,  good: null },
  { key: 'cpcB',  label: 'CPC B',    num: true,  good: null },
  { key: 'dcpc',  label: '△ CPC',    num: true,  good: false },
  { key: 'cvrA',  label: 'CVR A',    num: true,  good: null, cvr: true },
  { key: 'cvrB',  label: 'CVR B',    num: true,  good: null, cvr: true },
  { key: 'dcvr',  label: '△ CVR',    num: true,  good: true,  cvr: true },
  { key: 'cacA',  label: 'CAC A',    num: true,  good: null },
  { key: 'cacB',  label: 'CAC B',    num: true,  good: null },
  { key: 'dcac',  label: '△ CAC',    num: true,  good: false },
];

function rowValue(row, key) {
  switch(key) {
    case 'dctr': return calcDelta(row.ctrA, row.ctrB);
    case 'dcpc': return calcDelta(row.cpcA, row.cpcB);
    case 'dcvr': return calcDelta(row.cvrA, row.cvrB);
    case 'dcac': return calcDelta(row.cacA, row.cacB);
    default: return row[key];
  }
}

// Build one table data row from a list of raw data rows
function buildRow(name, rawRows, displayName) {
  const { pA_start, pA_end, pB_start, pB_end } = getPeriods();
  const mA = getMetrics(rawRows, pA_start, pA_end);
  const mB = getMetrics(rawRows, pB_start, pB_end);
  return {
    name: displayName || name,
    impA: mA.imp,  impB: mB.imp,
    clA:  mA.cl,   clB:  mB.cl,
    ctrA: mA.ctr,  ctrB: mB.ctr,
    costA: mA.cost, costB: mB.cost,
    cpcA: mA.cpc,  cpcB: mB.cpc,
    cvrA: mA.cvr,  cvrB: mB.cvr,
    cacA: mA.cac,  cacB: mB.cac,
  };
}

function cellHtml(row, col) {
  const key = col.key;
  const isCvr = col.cvr === true;
  const cellClass = (col.num ? 'num' : (key === 'name' ? 'name-col' : '')) + (isCvr ? ' cvr-col' : '');

  let content = '';
  switch(key) {
    case 'name':   content = `<span title="${row.name}">${row.name}</span>`; break;
    case 'impA': case 'impB': case 'clA': case 'clB': content = fmt(row[key]); break;
    case 'ctrA': case 'ctrB': case 'cvrA': case 'cvrB': content = fmtPct(row[key]); break;
    case 'costA': case 'costB': case 'cpcA': case 'cpcB': case 'cacA': case 'cacB': content = fmtDollar(row[key]); break;
    case 'dctr': case 'dcpc': case 'dcvr': case 'dcac': content = deltaHtml(rowValue(row, key), col.good); break;
    default: content = row[key] !== null && row[key] !== undefined ? row[key] : '—';
  }
  return `<td class="${cellClass}">${content}</td>`;
}

function renderTable(containerId, tableData, summaryRow, tableId) {
  const container = document.getElementById(containerId);
  if (!container) return;

  if (!tableData.length) {
    container.innerHTML = `<div class="no-data"><div>No data for the selected filters.</div></div>`;
    return;
  }

  const st = sortState[tableId];
  let sorted = [...tableData];
  if (st.col !== null) {
    sorted.sort((a, b) => {
      const va = rowValue(a, st.col) ?? -Infinity;
      const vb = rowValue(b, st.col) ?? -Infinity;
      if (typeof va === 'string') return va.localeCompare(vb) * st.dir;
      return (va - vb) * st.dir;
    });
  }

  function thHtml(col) {
    const isActive = st.col === col.key;
    const sortDir = isActive ? (st.dir === 1 ? '▲' : '▼') : '▲';
    const numCls = col.num ? ' num' : '';
    const cvrCls = col.cvr ? ' cvr-col' : '';
    const activeCls = isActive ? ' sort-active' : '';
    return `<th class="sort-hd${numCls}${cvrCls}${activeCls}" onclick="sortTable('${tableId}','${col.key}')">${col.label}<span class="sort-ind">${sortDir}</span></th>`;
  }

  const thead = `<thead><tr>${COL_DEFS.map(thHtml).join('')}</tr></thead>`;

  function trHtml(row, isSummary) {
    const cells = COL_DEFS.map(col => cellHtml(row, col)).join('');
    const cls = isSummary ? ' class="summary-row"' : '';
    return `<tr${cls}>${cells}</tr>`;
  }

  let tbody = '<tbody>';
  if (summaryRow) tbody += trHtml(summaryRow, true);
  sorted.forEach(row => { tbody += trHtml(row, false); });
  tbody += '</tbody>';

  container.innerHTML = `<table>${thead}${tbody}</table>`;
}

function sortTable(tableId, col) {
  const st = sortState[tableId];
  if (st.col === col) { st.dir = st.dir * -1; } else { st.col = col; st.dir = 1; }
  if (tableId === 'test') renderTestTable();
  else renderControlTable();
}

// ─────────────────────────────────────────────────────────────────────────────
// TEST TABLE — ad group level
// ─────────────────────────────────────────────────────────────────────────────
function renderTestTable() {
  // Group LP_TEST rows by ag
  const byAG = {};
  LP_TEST.forEach(r => {
    if (!byAG[r.ag]) byAG[r.ag] = [];
    byAG[r.ag].push(r);
  });

  const agList = Object.keys(byAG).sort();
  const tableData = agList.map(ag =>
    buildRow(ag, byAG[ag], stripPrefix(ag))
  );

  const summaryRow = buildRow('TOTAL', LP_TEST, 'TOTAL');

  renderTable('testTableWrap', tableData, summaryRow, 'test');
}

// ─────────────────────────────────────────────────────────────────────────────
// CONTROL TABLE — campaign level
// ─────────────────────────────────────────────────────────────────────────────
function renderControlTable() {
  // Group LP_CONTROL rows by camp
  const byCamp = {};
  LP_CONTROL.forEach(r => {
    if (!byCamp[r.camp]) byCamp[r.camp] = [];
    byCamp[r.camp].push(r);
  });

  const campList = Object.keys(byCamp).sort();
  const tableData = campList.map(camp =>
    buildRow(camp, byCamp[camp])
  );

  const summaryRow = buildRow('TOTAL', LP_CONTROL, 'TOTAL');

  renderTable('controlTableWrap', tableData, summaryRow, 'control');
}

// ─────────────────────────────────────────────────────────────────────────────
// DATE INPUTS
// ─────────────────────────────────────────────────────────────────────────────
function setupDateInputs() {
  // Set Period B end to the latest date available in the data (excludes today)
  const allDates = [...new Set([...LP_TEST.map(r => r.d), ...LP_CONTROL.map(r => r.d)])].sort();
  const latestDate = allDates[allDates.length - 1] || '2026-04-20';
  document.getElementById('pB_end').value = latestDate;

  ['pA_start','pA_end','pB_start','pB_end'].forEach(id => {
    document.getElementById(id).addEventListener('change', render);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
function init() {
  if (!isDataLoaded()) {
    setupDateInputs();
    renderNoData();
    return;
  }

  setupDateInputs();
  buildLayout();
  render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
